<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Aidan! 🎂</title>
  <style>
    @keyframes float1 { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-18px) rotate(5deg)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) rotate(3deg)} 50%{transform:translateY(-22px) rotate(-3deg)} }
    @keyframes float3 { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-14px) rotate(6deg)} }
    @keyframes confettiFall { 0%{transform:translateY(-30px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
    @keyframes twinkle { 0%,100%{opacity:1} 50%{opacity:0.25} }
    @keyframes shimmer { 0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5} }
    @keyframes ribbonDrop { 0%{transform:scaleX(0);opacity:0} 70%{transform:scaleX(1.04);opacity:1} 100%{transform:scaleX(1);opacity:1} }
    @keyframes titleEntrance { 0%{transform:translateY(-30px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    @keyframes fadeUp { 0%{transform:translateY(16px);opacity:0} 100%{transform:translateY(0);opacity:1} }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .scene {
      position:relative; width:100%; min-height:100vh;
      background:linear-gradient(160deg,#0d0730 0%,#1a0a4a 40%,#2d1060 70%,#4a1070 100%);
      overflow:hidden;
    }

    .stars { position:absolute; inset:0; pointer-events:none; }
    .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 2s infinite; }

    .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .confetti-piece { position:absolute; width:8px; height:14px; border-radius:2px; animation:confettiFall linear infinite; }

    /* Ribbon */
    .ribbon-banner {
      position:absolute; top:24px; left:0; right:0;
      display:flex; justify-content:center; gap:5px;
      animation:ribbonDrop 0.9s cubic-bezier(0.34,1.56,0.64,1) both 0.2s;
      flex-wrap:wrap; padding:0 16px;
    }
    .ribbon-letter {
      width:34px; height:38px; display:flex; align-items:center; justify-content:center;
      border-radius:7px; font-size:15px; font-weight:600; color:#fff;
    }

    /* Center content */
    .center {
      position:absolute; top:90px; left:0; right:0;
      display:flex; flex-direction:column; align-items:center;
      gap:0; text-align:center; padding:0 32px;
    }

    /* Title */
    .title-row {
      display:flex; align-items:center; justify-content:center; gap:20px;
      animation:titleEntrance 0.9s ease both 0.7s;
      margin-bottom:6px;
    }
    .title-block { text-align:center; }
    .title-main { font-size:36px; font-weight:400; color:rgba(255,255,255,0.85); line-height:1.1; }
    .title-name {
      font-size:60px; font-weight:700;
      background:linear-gradient(90deg,#ffd23f,#ff9f1c,#ff4d6d,#818cf8);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:pulse 2.5s ease-in-out infinite;
      display:block; line-height:1.15;
    }
    .gemini-badge {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      animation:fadeUp 0.7s ease both 1.3s; flex-shrink:0;
    }
    .gemini-symbol { font-size:28px; color:#ffd23f; animation:shimmer 3s ease-in-out infinite; }
    .gemini-label { font-size:10px; color:rgba(255,200,50,0.8); letter-spacing:2px; text-transform:uppercase; }

    /* Wish — single rotating line */
    .wish-wrap {
      margin-top:80px;
      animation:fadeUp 0.8s ease both 1.1s;
      min-height:36px;
      display:flex; align-items:center; justify-content:center;
    }
    .wish-text {
      font-size:26px; font-weight:400;
      color:rgba(255,255,255,0.75);
      line-height:1.6;
      transition:opacity 0.5s;
      max-width:620px;
    }
    .wish-text em {
      font-style:normal;
      background:linear-gradient(90deg,#ffd23f,#ff9f1c);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      font-weight:500;
    }

    /* Divider */
    .divider {
      margin-top:36px;
      width:160px; height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
      animation:fadeUp 0.6s ease both 1.5s;
    }

    /* Joke */
    .joke-wrap {
      margin-top:32px;
      animation:fadeUp 0.8s ease both 1.6s;
      min-height:52px;
      display:flex; flex-direction:column; align-items:center; gap:14px;
    }
    .joke-text {
      font-size:22px; color:rgba(255,255,255,0.6);
      line-height:1.7; max-width:580px;
      transition:opacity 0.4s;
    }
    .joke-dots { display:flex; gap:7px; }
    .joke-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.18); transition:background 0.4s; }
    .joke-dot.active { background:rgba(255,255,255,0.55); }

    /* Balloons */
    .balloons { position:absolute; bottom:44px; left:0; right:0; display:flex; justify-content:space-around; align-items:flex-end; padding:0 20px; pointer-events:none; }
    .balloon { display:flex; flex-direction:column; align-items:center; }
    .balloon-body { width:60px; height:74px; border-radius:50% 50% 50% 50% / 45% 45% 55% 55%; position:relative; }
    .balloon-shine { position:absolute; top:10px; left:12px; width:14px; height:20px; background:rgba(255,255,255,0.32); border-radius:50%; transform:rotate(-25deg); }
    .balloon-string { width:1px; height:82px; background:rgba(255,255,255,0.4); }
    .b1 .balloon-body { background:#ff4d6d; animation:float1 4s ease-in-out infinite; }
    .b2 .balloon-body { background:#ffd23f; animation:float2 3.5s ease-in-out infinite; }
    .b3 .balloon-body { background:#06d6a0; animation:float3 5s ease-in-out infinite; }
    .b4 .balloon-body { background:#818cf8; animation:float1 3.8s ease-in-out infinite 0.5s; }
    .b5 .balloon-body { background:#ff9f1c; animation:float2 4.2s ease-in-out infinite 1s; }
    .b6 .balloon-body { background:#f72585; animation:float3 3.2s ease-in-out infinite 0.3s; }

    .firework-canvas { position:absolute; inset:0; pointer-events:none; }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="confetti-container" id="confetti"></div>
    <canvas class="firework-canvas" id="fwCanvas"></canvas>

    <div class="ribbon-banner" id="ribbon"></div>

    <div class="center">

      <!-- Title + Gemini side by side -->
      <div class="title-row">
        <div class="title-block">
          <div class="title-main">Happy Birthday</div>
          <span class="title-name">Aidan! 🎂</span>
        </div>
        <div class="gemini-badge">
          <div class="gemini-symbol">♊</div>
          <div class="gemini-label">Gemini</div>
        </div>
      </div>

      <!-- Single rotating wish line -->
      <div class="wish-wrap">
        <div class="wish-text" id="wishText">May this year be as <em>brilliant & unforgettable</em> as you are 🥂</div>
      </div>

      <div class="divider"></div>

      <!-- Rotating joke -->
      <div class="joke-wrap">
        <div class="joke-text" id="jokeText">Why did Aidan bring a ladder to his party? He heard the drinks were on the house! 🍻</div>
        <div class="joke-dots" id="jokeDots"></div>
      </div>

    </div>

    <div class="balloons">
      <div class="balloon b1"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b2"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b3"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b4"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b5"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b6"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
    </div>
  </div>

  <script>
    const ribbonColors = ['#ff4d6d','#ffd23f','#06d6a0','#818cf8','#ff9f1c','#f72585','#4cc9f0'];
    'HAPPY BIRTHDAY AIDAN'.split('').forEach((ch,i) => {
      const el = document.createElement('div');
      el.className = 'ribbon-letter';
      el.textContent = ch === ' ' ? '' : ch;
      el.style.background = ch === ' ' ? 'transparent' : ribbonColors[i % ribbonColors.length];
      el.style.width = ch === ' ' ? '10px' : '34px';
      document.getElementById('ribbon').appendChild(el);
    });

    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*75+'%';
      s.style.animationDelay = (Math.random()*3)+'s';
      s.style.animationDuration = (1.5+Math.random()*2.5)+'s';
      const sz = (1+Math.random()*2.5)+'px';
      s.style.width = s.style.height = sz;
      document.getElementById('stars').appendChild(s);
    }

    const confettiColors = ['#ff4d6d','#ffd23f','#06d6a0','#818cf8','#ff9f1c','#f72585','#4cc9f0','#a78bfa'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100+'%';
      c.style.background = confettiColors[i % confettiColors.length];
      c.style.animationDuration = (4+Math.random()*6)+'s';
      c.style.animationDelay = (Math.random()*7)+'s';
      c.style.opacity = 0.5+Math.random()*0.5;
      document.getElementById('confetti').appendChild(c);
    }

    // Wishes — short, one line each
    const wishes = [
      `May this year be as <em>brilliant & unforgettable</em> as you are 🥂`,
      `You make every room funnier and every problem smaller 🌟`,
      `Twice the personality, twice the genius — classic Gemini 🪄`,
      `Here's to more laughs, big adventures, and everything you deserve 🎊`,
    ];
    let wi = 0;
    setInterval(() => {
      wi = (wi+1) % wishes.length;
      const el = document.getElementById('wishText');
      el.style.opacity = 0;
      setTimeout(() => { el.innerHTML = wishes[wi]; el.style.opacity = 1; }, 500);
    }, 7000);

    // Jokes
    const jokes = [
      "Why did Aidan bring a ladder to his party? He heard the drinks were on the house! 🍻",
      "As a Gemini, Aidan has two sides: incredibly funny... and even funnier. ♊",
      "So smart he finished the puzzle in 3 days — the box said '2–4 years'. 🧩",
      "They say Geminis are indecisive. Aidan disagrees. And also agrees. ✌️",
      "His brain is so fast, he laughs at a joke before you finish te— 😀",
      "He read the manual. Twice. In two different moods. 📚",
      "Aidan doesn't age — he levels up. 🎮"
    ];
    const dotsEl = document.getElementById('jokeDots');
    jokes.forEach((_,i) => {
      const d = document.createElement('div');
      d.className = 'joke-dot'+(i===0?' active':'');
      dotsEl.appendChild(d);
    });
    let ji = 0;
    setInterval(() => {
      ji = (ji+1) % jokes.length;
      const el = document.getElementById('jokeText');
      el.style.opacity = 0;
      setTimeout(() => {
        el.textContent = jokes[ji]; el.style.opacity = 1;
        document.querySelectorAll('.joke-dot').forEach((d,i)=>d.classList.toggle('active',i===ji));
      }, 400);
    }, 5000);

    // Fireworks
    const canvas = document.getElementById('fwCanvas');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const fw = ['#ffd23f','#ff4d6d','#818cf8','#06d6a0','#ff9f1c','#f72585','#4cc9f0','#a78bfa','#fff'];

    class P {
      constructor(x,y,col){
        this.x=x;this.y=y;this.c=col;
        const a=Math.random()*Math.PI*2,s=1.5+Math.random()*4.5;
        this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
        this.a=1;this.d=0.013+Math.random()*0.016;
        this.r=2+Math.random()*2.2;this.g=0.06;this.tr=[];
      }
      tick(){
        this.tr.push({x:this.x,y:this.y,a:this.a});
        if(this.tr.length>5)this.tr.shift();
        this.vy+=this.g;this.x+=this.vx;this.y+=this.vy;this.a-=this.d;
      }
      draw(){
        this.tr.forEach((t,i)=>{
          ctx.save();ctx.globalAlpha=t.a*(i/this.tr.length)*0.35;
          ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(t.x,t.y,this.r*0.6,0,Math.PI*2);ctx.fill();ctx.restore();
        });
        ctx.save();ctx.globalAlpha=Math.max(0,this.a);
        ctx.fillStyle=this.c;ctx.shadowColor=this.c;ctx.shadowBlur=5;
        ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
    class R {
      constructor(){
        this.x=canvas.width*(0.12+Math.random()*0.76);
        this.y=canvas.height;
        this.ty=canvas.height*(0.07+Math.random()*0.44);
        this.c=fw[Math.floor(Math.random()*fw.length)];
        this.s=6+Math.random()*5;this.done=false;this.tr=[];
      }
      tick(){
        this.tr.push({x:this.x,y:this.y});
        if(this.tr.length>10)this.tr.shift();
        this.y-=this.s;if(this.y<=this.ty)this.done=true;
      }
      draw(){
        this.tr.forEach((t,i)=>{
          ctx.save();ctx.globalAlpha=(i/this.tr.length)*0.7;
          ctx.fillStyle=this.c;ctx.shadowColor=this.c;ctx.shadowBlur=4;
          ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();ctx.restore();
        });
        ctx.save();ctx.globalAlpha=1;ctx.fillStyle=this.c;ctx.shadowColor=this.c;ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
    let rs=[],ps=[];
    function salvo(){
      const n=2+Math.floor(Math.random()*3);
      for(let i=0;i<n;i++) setTimeout(()=>rs.push(new R()),i*220);
    }
    function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      rs=rs.filter(r=>{r.tick();r.draw();
        if(r.done){
          for(let i=0;i<90+Math.floor(Math.random()*50);i++)ps.push(new P(r.x,r.y,r.c));
          const c2=fw[Math.floor(Math.random()*fw.length)];
          for(let i=0;i<18;i++)ps.push(new P(r.x,r.y,c2));
        }
        return !r.done;
      });
      ps=ps.filter(p=>{p.tick();p.draw();return p.a>0;});
      requestAnimationFrame(loop);
    }
    loop();
    setTimeout(function go(){ salvo(); setTimeout(go,5000+Math.random()*4000); },3000);
  </script>
</body>
</html>
