<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAM × Equipsy — Team Lunch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lato:wght@300;400;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --mam-orange: #E8631A;
  --mam-dark:   #2B2B2B;
  --eq-blue:    #00A8F3;
  --cream:      #FFF8F0;
  --warm-white: #FFFCF8;
  --chilli-red: #C0392B;
  --lime:       #7DBE31;
  --guac:       #4A7C59;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--cream);
  font-family: 'Lato', sans-serif;
}

/* ───── CANVAS ───── */
.canvas {
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto 1fr auto;
  position: relative;
  overflow: hidden;
}

/* ───── BACKGROUND TEXTURE ───── */
.bg-wrap {
  position: fixed; inset: 0; z-index: 0;
  background: var(--cream);
}
.bg-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 15% 25%, rgba(232,99,26,0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(0,168,243,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(232,99,26,0.04) 0%, transparent 70%);
}
/* subtle tortilla pattern */
.bg-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='%23E8631A' stroke-width='0.3' stroke-dasharray='3 6' opacity='0.12'/%3E%3C/svg%3E");
  background-size: 60px 60px;
}

/* ───── FLOATING BURRITOS ───── */
.floaters {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
}
.floater {
  position: absolute;
  font-size: 3rem;
  opacity: 0;
  animation: floatDrift linear infinite;
  filter: saturate(1.2);
}
@keyframes floatDrift {
  0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
  8%   { opacity: 0.18; }
  92%  { opacity: 0.18; }
  100% { transform: translateY(-8vh) rotate(30deg);    opacity: 0; }
}

/* ───── TOP BAND ───── */
.top-band {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3.5vh 4vw 0;
  gap: 4vw;
}
.logo-wrap {
  display: flex; align-items: center; justify-content: center;
  animation: fadeSlideDown 1s ease-out both;
}
.logo-wrap img { height: 72px; object-fit: contain; }
.logo-wrap.mam img { height: 68px; }
.logo-wrap.eq  img { height: 56px; }

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-28px); }
  to   { opacity: 1; transform: translateY(0); }
}

.connector {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  animation: fadeSlideDown 1s ease-out 0.2s both;
}
.connector-emoji {
  font-size: 2.6rem;
  animation: handshakeBounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.12));
}
.connector-label {
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  font-weight: 700;
  color: rgba(43,43,43,0.35);
  letter-spacing: 0.06em;
}
@keyframes handshakeBounce {
  0%, 100% { transform: scale(1) rotate(-4deg); }
  40%       { transform: scale(1.18) rotate(4deg); }
  70%       { transform: scale(1.08) rotate(-2deg); }
}

/* ───── HERO ───── */
.hero {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 2vh 2rem;
}

.eyebrow {
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mam-orange);
  margin-bottom: 1.4vh;
  animation: fadeIn 1s ease-out 0.4s both;
}

.headline {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(4rem, 11vw, 9rem);
  line-height: 0.92;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--mam-dark);
  animation: fadeIn 1s ease-out 0.5s both;
  position: relative;
}
.headline .word-team {
  display: block;
  color: var(--mam-orange);
}
.headline .word-lunch {
  display: block;
  font-family: 'Caveat', cursive;
  font-size: clamp(5rem, 13vw, 11rem);
  font-weight: 700;
  color: var(--eq-blue);
  -webkit-text-stroke: 0;
  line-height: 0.85;
  letter-spacing: 0.04em;
}

.sub-row {
  display: flex; align-items: center; gap: 1.2rem;
  margin-top: 2.4vh;
  animation: fadeIn 1s ease-out 0.7s both;
}
.sub-divider { width: 40px; height: 1px; background: rgba(43,43,43,0.2); }
.sub-text {
  font-family: 'Lato', sans-serif;
  font-size: 1.05rem;
  font-weight: 300;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(43,43,43,0.55);
}

/* ───── BURRITO HERO ICON ───── */
.burrito-hero {
  font-size: clamp(4rem, 8vw, 7rem);
  line-height: 1;
  margin: 2vh 0 0.5vh;
  animation: bounceSpin 5s ease-in-out infinite, fadeIn 1s ease-out 0.6s both;
  display: inline-block;
  filter: drop-shadow(0 8px 24px rgba(232,99,26,0.25));
}
@keyframes bounceSpin {
  0%, 100% { transform: rotate(-6deg) scale(1); }
  30%       { transform: rotate(8deg) scale(1.06); }
  60%       { transform: rotate(-4deg) scale(0.97); }
}

/* ───── CHIPS ROW ───── */
.chips-row {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  gap: 1rem; flex-wrap: wrap;
  padding: 0 2rem 2vh;
  animation: fadeIn 1s ease-out 0.9s both;
}
.chip {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem 1.2rem;
  border-radius: 100px;
  font-family: 'Lato', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.chip.orange {
  background: rgba(232,99,26,0.1);
  border: 1px solid rgba(232,99,26,0.3);
  color: var(--mam-orange);
}
.chip.blue {
  background: rgba(0,168,243,0.08);
  border: 1px solid rgba(0,168,243,0.25);
  color: var(--eq-blue);
}
.chip.dark {
  background: rgba(43,43,43,0.07);
  border: 1px solid rgba(43,43,43,0.15);
  color: var(--mam-dark);
}
.chip-icon { font-size: 1.1rem; }

/* ───── TICKER ───── */
.ticker-outer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  height: 46px; overflow: hidden;
  background: var(--mam-dark);
}
.ticker-label {
  position: absolute; left: 0; top: 0; bottom: 0; z-index: 2;
  display: flex; align-items: center; padding: 0 1.4rem;
  background: var(--mam-orange);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #fff;
  white-space: nowrap;
}
.ticker-label::after {
  content: '';
  position: absolute; right: -16px; top: 0; bottom: 0;
  border-left: 16px solid var(--mam-orange);
  border-top: 23px solid transparent;
  border-bottom: 23px solid transparent;
}
.ticker-track {
  display: flex;
  animation: tickerScroll 28s linear infinite;
  align-items: center;
  height: 100%;
  padding-left: 180px;
}
.ticker-item {
  white-space: nowrap;
  padding: 0 3rem;
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem; font-weight: 400;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.75);
}
.ticker-item strong { color: #fff; font-weight: 700; }
@keyframes tickerScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ───── ACCENT STRIPE ───── */
.accent-stripe {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(to bottom, var(--mam-orange) 0%, var(--mam-orange) 50%, var(--eq-blue) 50%, var(--eq-blue) 100%);
  z-index: 20;
}
.accent-stripe-r {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(to bottom, var(--eq-blue) 0%, var(--eq-blue) 50%, var(--mam-orange) 50%, var(--mam-orange) 100%);
  z-index: 20;
}



/* ───── REDUCED MOTION ───── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; }
}
</style>
</head>

<script>

const floaterEl = document.getElementById('floaters');
const items = ['🌯','🥑','🌶️','🧀','🌽','⚽','🏆','🌮','🫘','⚽','🌯','🏆'];
for (let i = 0; i < 18; i++) {
  const el = document.createElement('span');
  el.className = 'floater';
  el.textContent = items[Math.floor(Math.random() * items.length)];
  el.style.left = (Math.random() * 100) + 'vw';
  el.style.fontSize = (1.8 + Math.random() * 2.2) + 'rem';
  el.style.animationDuration = (12 + Math.random() * 16) + 's';
  el.style.animationDelay = (Math.random() * 20) + 's';
  floaterEl.appendChild(el);
}

// ── ticker
const msgs = [
  '🌯 <strong>Team Lunch</strong> — MAM × Equipsy',

  '🧀 Cheese is mandatory — this is not a debate',
  '🌯 <strong>Team Lunch</strong> — MAM × Equipsy',
  '🥑 Fresh guacamole, crispy salsa & loaded burritos',
  '🤝 Two teams, one table, zero wrong orders',
  '⚽ Powered by World Cup energy &amp; Mexican flavour',
  '🌶️ <strong>Burrito Rule #1:</strong> Always double-wrap',
  '🧀 Cheese is mandatory — this is not a debate',
];
const track = document.getElementById('tickerTrack');
msgs.forEach(m => {
  const span = document.createElement('span');
  span.className = 'ticker-item';
  span.innerHTML = m + ' &nbsp; ✦';
  track.appendChild(span);
});
</script>
