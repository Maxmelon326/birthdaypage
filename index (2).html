<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Aiden! 🎂</title>
  <style>
    @keyframes float1 { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-18px) rotate(5deg)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) rotate(3deg)} 50%{transform:translateY(-22px) rotate(-3deg)} }
    @keyframes float3 { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-14px) rotate(6deg)} }
    @keyframes confettiFall { 0%{transform:translateY(-30px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
    @keyframes twinkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
    @keyframes shimmer { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:0.6} }
    @keyframes ribbonDrop { 0%{transform:scaleX(0);opacity:0} 60%{transform:scaleX(1.05);opacity:1} 100%{transform:scaleX(1);opacity:1} }
    @keyframes titleEntrance { 0%{transform:translateY(-40px) scale(0.8);opacity:0} 70%{transform:translateY(4px) scale(1.03)} 100%{transform:translateY(0) scale(1);opacity:1} }
    @keyframes bounceIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .scene {
      position:relative; width:100%; min-height:100vh;
      background:linear-gradient(160deg,#0d0730 0%,#1a0a4a 40%,#2d1060 70%,#4a1070 100%);
      overflow:hidden;
    }

    .stars { position:absolute; inset:0; pointer-events:none; }
    .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 2s infinite; }

    .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .confetti-piece { position:absolute; width:8px; height:14px; border-radius:2px; animation:confettiFall linear infinite; }

    .balloons { position:absolute; bottom:50px; left:0; right:0; display:flex; justify-content:space-around; align-items:flex-end; padding:0 20px; pointer-events:none; }
    .balloon { display:flex; flex-direction:column; align-items:center; }
    .balloon-body { width:64px; height:80px; border-radius:50% 50% 50% 50% / 45% 45% 55% 55%; position:relative; }
    .balloon-shine { position:absolute; top:10px; left:13px; width:15px; height:22px; background:rgba(255,255,255,0.35); border-radius:50%; transform:rotate(-25deg); }
    .balloon-string { width:1px; height:90px; background:rgba(255,255,255,0.5); }

    .b1 .balloon-body { background:#ff4d6d; animation:float1 4s ease-in-out infinite; }
    .b2 .balloon-body { background:#ffd23f; animation:float2 3.5s ease-in-out infinite; }
    .b3 .balloon-body { background:#06d6a0; animation:float3 5s ease-in-out infinite; }
    .b4 .balloon-body { background:#818cf8; animation:float1 3.8s ease-in-out infinite 0.5s; }
    .b5 .balloon-body { background:#ff9f1c; animation:float2 4.2s ease-in-out infinite 1s; }
    .b6 .balloon-body { background:#f72585; animation:float3 3.2s ease-in-out infinite 0.3s; }

    .ribbon-banner { position:absolute; top:28px; left:0; right:0; display:flex; justify-content:center; gap:5px; animation:ribbonDrop 1s cubic-bezier(0.34,1.56,0.64,1) both 0.3s; flex-wrap:wrap; padding:0 16px; }
    .ribbon-letter { width:36px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:7px; font-size:16px; font-weight:600; color:#fff; }

    .top-section { position:absolute; top:96px; left:0; right:0; display:flex; align-items:flex-start; justify-content:center; padding:0 32px; gap:24px; animation:titleEntrance 1s cubic-bezier(0.34,1.56,0.64,1) both 0.8s; }
    .title-area { flex:1; text-align:center; }
    .title-main { font-size:42px; font-weight:500; color:#fff; text-shadow:0 0 30px rgba(160,120,255,0.8),0 4px 20px rgba(0,0,0,0.5); line-height:1.1; }
    .title-name { font-size:58px; font-weight:600; background:linear-gradient(90deg,#ffd23f,#ff9f1c,#ff4d6d,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:pulse 2s ease-in-out infinite; display:block; margin-top:6px; }

    .gemini-badge { display:flex; flex-direction:column; align-items:center; gap:6px; animation:bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both 1.6s; padding-top:10px; flex-shrink:0; }
    .gemini-symbol { font-size:34px; color:#ffd23f; animation:shimmer 3s ease-in-out infinite; }
    .gemini-label { font-size:11px; color:rgba(255,200,50,0.9); letter-spacing:2px; text-transform:uppercase; }

    .traits-row { position:absolute; top:248px; left:0; right:0; display:flex; justify-content:center; gap:10px; padding:0 24px; animation:titleEntrance 0.8s ease both 1.2s; flex-wrap:wrap; }
    .trait-pill { padding:8px 18px; border-radius:20px; font-size:14px; font-weight:500; border:1px solid rgba(255,255,255,0.25); }
    .tp1{background:rgba(255,77,109,0.25);color:#ff8fa3}
    .tp2{background:rgba(255,210,63,0.2);color:#ffd23f}
    .tp3{background:rgba(129,140,248,0.25);color:#a5b4fc}
    .tp4{background:rgba(6,214,160,0.2);color:#5eead4}
    .tp5{background:rgba(255,159,28,0.2);color:#fdba74}

    /* Frameless centered joke area */
    .joke-area {
      position:absolute; top:318px;
      left:0; right:0;
      display:flex; flex-direction:column; align-items:center;
      padding:0 40px;
      animation:fadeUp 0.8s ease both 1.5s;
      text-align:center;
    }
    .joke-label {
      font-size:12px; text-transform:uppercase; letter-spacing:3px;
      color:rgba(255,255,255,0.35);
      margin-bottom:16px;
    }
    .joke-text {
      font-size:20px; color:#fff; line-height:1.75;
      min-height:60px;
      max-width:700px;
      text-shadow: 0 2px 16px rgba(100,60,200,0.5);
      transition:opacity 0.4s;
    }
    .joke-dots {
      display:flex; gap:8px; margin-top:20px;
    }
    .joke-dot {
      width:6px; height:6px; border-radius:50%;
      background:rgba(255,255,255,0.2);
      transition:background 0.4s;
    }
    .joke-dot.active { background:rgba(255,255,255,0.7); }

    .firework-canvas { position:absolute; inset:0; pointer-events:none; }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="confetti-container" id="confetti"></div>
    <canvas class="firework-canvas" id="fwCanvas"></canvas>

    <div class="ribbon-banner" id="ribbon"></div>

    <div class="top-section">
      <div class="title-area">
        <div class="title-main">Happy Birthday</div>
        <span class="title-name">Aiden! 🎂</span>
      </div>
      <div class="gemini-badge">
        <div class="gemini-symbol">♊</div>
        <div class="gemini-label">Gemini</div>
      </div>
    </div>

    <div class="traits-row">
      <div class="trait-pill tp1">🤣 Hilarious</div>
      <div class="trait-pill tp2">🧠 Sharp</div>
      <div class="trait-pill tp3">♊ Dual-natured</div>
      <div class="trait-pill tp4">⚡ Quick-witted</div>
      <div class="trait-pill tp5">🎯 Clever</div>
    </div>

    <div class="joke-area">
      <div class="joke-label">✨ Aiden's Daily Wisdom ✨</div>
      <div class="joke-text" id="jokeText">Why did Aiden bring a ladder to his birthday party? Because he heard the drinks were on the house! 🍻</div>
      <div class="joke-dots" id="jokeDots"></div>
    </div>

    <div class="balloons">
      <div class="balloon b1"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b2"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b3"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b4"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b5"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
      <div class="balloon b6"><div class="balloon-body"><div class="balloon-shine"></div></div><div class="balloon-string"></div></div>
    </div>
  </div>

  <script>
    const ribbonColors = ['#ff4d6d','#ffd23f','#06d6a0','#818cf8','#ff9f1c','#f72585','#4cc9f0'];
    'HAPPY BIRTHDAY AIDEN'.split('').forEach((ch,i) => {
      const el = document.createElement('div');
      el.className = 'ribbon-letter';
      el.textContent = ch === ' ' ? '' : ch;
      el.style.background = ch === ' ' ? 'transparent' : ribbonColors[i % ribbonColors.length];
      el.style.width = ch === ' ' ? '10px' : '36px';
      document.getElementById('ribbon').appendChild(el);
    });

    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*70+'%';
      s.style.animationDelay = (Math.random()*3)+'s';
      s.style.animationDuration = (1.5+Math.random()*2)+'s';
      const sz = (1+Math.random()*3)+'px';
      s.style.width = s.style.height = sz;
      document.getElementById('stars').appendChild(s);
    }

    const confettiColors = ['#ff4d6d','#ffd23f','#06d6a0','#818cf8','#ff9f1c','#f72585','#4cc9f0','#a78bfa'];
    for (let i = 0; i < 45; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100+'%';
      c.style.background = confettiColors[i % confettiColors.length];
      c.style.animationDuration = (4+Math.random()*6)+'s';
      c.style.animationDelay = (Math.random()*7)+'s';
      c.style.opacity = 0.6+Math.random()*0.4;
      document.getElementById('confetti').appendChild(c);
    }

    const jokes = [
      "Why did Aiden bring a ladder to his birthday party? Because he heard the drinks were on the house! 🍻",
      "As a Gemini, Aiden has two sides: incredibly funny... and even funnier. ♊",
      "Aiden is so smart, he finished the puzzle in 3 days — the box said '2–4 years'. 🧩",
      "They say Geminis are indecisive. Aiden disagrees. And also agrees. ♊✌️",
      "Aiden's brain is so fast, he laughs at a joke before you finish te— 😂",
      "Why is Aiden great at everything? He read the manual. Twice. In two different moods. 📚",
      "Aiden doesn't age — he levels up. 🎮 Happy birthday, legend!"
    ];

    // build dots
    const dotsEl = document.getElementById('jokeDots');
    jokes.forEach((_,i) => {
      const d = document.createElement('div');
      d.className = 'joke-dot' + (i===0 ? ' active' : '');
      dotsEl.appendChild(d);
    });

    let jokeIndex = 0;
    function updateDots() {
      document.querySelectorAll('.joke-dot').forEach((d,i) => {
        d.classList.toggle('active', i === jokeIndex);
      });
    }
    setInterval(() => {
      jokeIndex = (jokeIndex + 1) % jokes.length;
      const el = document.getElementById('jokeText');
      el.style.opacity = 0;
      setTimeout(() => { el.textContent = jokes[jokeIndex]; el.style.opacity = 1; updateDots(); }, 400);
    }, 5000);

    const canvas = document.getElementById('fwCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const fwColors = ['#ffd23f','#ff4d6d','#818cf8','#06d6a0','#ff9f1c','#f72585','#4cc9f0','#a78bfa','#fff'];

    class Particle {
      constructor(x,y,color){
        this.x=x;this.y=y;this.color=color;
        const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4.5;
        this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
        this.alpha=1;this.decay=0.012+Math.random()*0.018;
        this.size=2+Math.random()*2.5;this.gravity=0.06;this.trail=[];
      }
      update(){
        this.trail.push({x:this.x,y:this.y,a:this.alpha});
        if(this.trail.length>5)this.trail.shift();
        this.vy+=this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay;
      }
      draw(){
        for(let i=0;i<this.trail.length;i++){
          const t=this.trail[i];
          ctx.save();ctx.globalAlpha=t.a*(i/this.trail.length)*0.4;
          ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(t.x,t.y,this.size*0.6,0,Math.PI*2);ctx.fill();ctx.restore();
        }
        ctx.save();ctx.globalAlpha=Math.max(0,this.alpha);
        ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }

    class Rocket {
      constructor(){
        this.x=canvas.width*(0.15+Math.random()*0.7);
        this.y=canvas.height;
        this.targetY=canvas.height*(0.08+Math.random()*0.45);
        this.color=fwColors[Math.floor(Math.random()*fwColors.length)];
        this.speed=6+Math.random()*5;this.exploded=false;this.trail=[];
      }
      update(){
        this.trail.push({x:this.x,y:this.y});
        if(this.trail.length>10)this.trail.shift();
        this.y-=this.speed;
        if(this.y<=this.targetY)this.exploded=true;
      }
      draw(){
        for(let i=0;i<this.trail.length;i++){
          const t=this.trail[i];
          ctx.save();ctx.globalAlpha=(i/this.trail.length)*0.7;
          ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=4;
          ctx.beginPath();ctx.arc(t.x,t.y,2,0,Math.PI*2);ctx.fill();ctx.restore();
        }
        ctx.save();ctx.globalAlpha=1;ctx.fillStyle=this.color;
        ctx.shadowColor=this.color;ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }

    let rockets=[],particles=[];
    function launchSalvo(){
      const count=2+Math.floor(Math.random()*3);
      for(let i=0;i<count;i++) setTimeout(()=>rockets.push(new Rocket()),i*220);
    }
    function animate(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      rockets=rockets.filter(r=>{
        r.update();r.draw();
        if(r.exploded){
          for(let i=0;i<80+Math.floor(Math.random()*60);i++) particles.push(new Particle(r.x,r.y,r.color));
          const c2=fwColors[Math.floor(Math.random()*fwColors.length)];
          for(let i=0;i<20;i++) particles.push(new Particle(r.x,r.y,c2));
        }
        return !r.exploded;
      });
      particles=particles.filter(p=>{p.update();p.draw();return p.alpha>0;});
      requestAnimationFrame(animate);
    }
    animate();

    setTimeout(function scheduleNext(){
      launchSalvo();
      setTimeout(scheduleNext,5000+Math.random()*4000);
    },3000);
  </script>
</body>
</html>
